<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Girl Math Wallet logo</title>
  <desc id="desc">A pink wallet with coins, sparkles, and an upward investment chart.</desc>
  <defs>
    <linearGradient id="bg" x1="70" y1="40" x2="448" y2="476" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff3c6"/>
      <stop offset=".45" stop-color="#ff98bd"/>
      <stop offset="1" stop-color="#58c7a2"/>
    </linearGradient>
    <linearGradient id="wallet" x1="129" y1="170" x2="392" y2="392" gradientUnits="userSpaceOnUse">
